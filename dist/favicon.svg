  </defs>
  <!-- 4 tines -->
  <line x1="34" y1="10" x2="34" y2="46" stroke="url(#forkGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="52" y1="10" x2="52" y2="46" stroke="url(#forkGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="76" y1="10" x2="76" y2="46" stroke="url(#forkGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="94" y1="10" x2="94" y2="46" stroke="url(#forkGrad)" stroke-width="8" stroke-linecap="round"/>
